services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: always 
    environment:
      - DOMAIN=${VAULT_DOMAIN}
      - ROCKET_PORT=80
      - SIGNUPS_ALLOWED=false #change this if you want someone to be able to make an account
    volumes:
      - ./vaultwarden:/data
    networks:
      main_net:
        ipv4_address: 10.5.0.50


networks:
  main_net:
    external: true
    name: main_net

