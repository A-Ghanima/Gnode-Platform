services:
  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: proxy
    restart: always
    labels:
      - "gnode.group=infrastructure"
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ../../.data/npm/data:/data
      - ../../.data/npm/letsencrypt:/etc/letsencrypt
    networks:
      main_net:
        ipv4_address: 10.5.0.10

  dns-updater:
    image: favonia/cloudflare-ddns:latest
    container_name: ddns
    restart: always
    labels:
      - "gnode.group=infrastructure"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAINS=${DDNS_DOMAINS}
      - PROXIED=true
      - UPDATE_CRON=@every 60m
      - IP4_PROVIDER=cloudflare.trace
      - IP6_PROVIDER=none
    network_mode: host

networks:
  main_net:
    external: true
    name: main_net
