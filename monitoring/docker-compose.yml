services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    networks:
      main_net:
        ipv4_address: 10.5.0.80

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      main_net:
        ipv4_address: 10.5.0.81

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      main_net:
        ipv4_address: 10.5.0.82


  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      main_net:
        ipv4_address: 10.5.0.83

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      main_net:
        ipv4_address: 10.5.0.84

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      main_net:
        ipv4_address: 10.5.0.85

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    labels:
      - "gnode.group=monitoring"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.template.yml:ro
      - ./alertmanager/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      main_net:
        ipv4_address: 10.5.0.86

  blackbox:
    image: prom/blackbox-exporter:latest
    container_name: blackbox
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - ./exporters/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
    networks:
      main_net:
        ipv4_address: 10.5.0.87

  smartctl-exporter:
    image: prometheuscommunity/smartctl-exporter:latest
    container_name: smartctl-exporter
    restart: always
    labels:
      - "gnode.group=monitoring"
    volumes:
      - /run/udev:/run/udev:ro
    networks:
      main_net:
        ipv4_address: 10.5.0.90

  mariadb-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mariadb-exporter
    restart: always
    labels:
      - "gnode.group=monitoring"
    command:
      - '--config.my-cnf=/etc/mysql/.my.cnf'
    volumes:
      - ./exporters/.my.cnf:/etc/mysql/.my.cnf:ro
    networks:
      main_net:
        ipv4_address: 10.5.0.93

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: always
    labels:
      - "gnode.group=monitoring"
    command:
      - '--nginx.scrape-uri=http://10.5.0.10:8080/nginx_status'
    networks:
      main_net:
        ipv4_address: 10.5.0.88

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  main_net:
    external: true
    name: main_net
