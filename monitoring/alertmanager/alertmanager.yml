global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10m
  repeat_interval: 1h
  receiver: 'telegram'

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: ## add your token
        chat_id: ## add your chat id
        message: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

