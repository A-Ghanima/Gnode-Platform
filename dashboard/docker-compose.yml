services:
  backend:
    build: ./backend
    container_name: gnode-dashboard-backend
    restart: always
    env_file: ./backend/.env
    labels:
      - "gnode.group=dashboard"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    networks:
      main_net:
        ipv4_address: 10.5.0.100

networks:
  main_net:
    external: true
    name: main_net
